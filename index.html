let aiUploadImgs=[]; // base64 data URLs

function openAIUploadModal(){
  aiUploadImgs=[];
  const box=document.getElementById('modal-box');
  box.innerHTML=`
    <div class="modal-title">📸 Upload Meal from Screenshots</div>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:16px;line-height:1.5">
      Upload one or more screenshots of a recipe. Claude AI will extract the meal name, ingredients, and instructions automatically.
    </p>
    <div class="dropzone" onclick="document.getElementById('ai-img-upload').click()" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="event.preventDefault();this.classList.remove('drag-over');handleAIImgDrop(event)">
      <div class="dropzone-icon">📸</div>
      <div class="dropzone-text">Click or drag recipe screenshots</div>
      <div class="dropzone-sub">Supports JPG, PNG, WebP — multiple allowed</div>
    </div>
    <input type="file" id="ai-img-upload" accept="image/*" multiple style="display:none" onchange="handleAIImgSelect(event)">
    <div class="upload-preview-grid" id="ai-img-preview"></div>
    <div id="ai-status-wrap"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:2" id="ai-extract-btn" onclick="runAIExtraction()" disabled>
        ✨ Extract Recipe with AI
      </button>
    </div>`;
  document.getElementById('modal-overlay').style.display='flex';
}

function handleAIImgSelect(e){
  const files=Array.from(e.target.files||[]);
  for(const f of files){
    const reader=new FileReader();
    reader.onload=ev=>{
      aiUploadImgs.push(ev.target.result);
      updateAIPreview();
    };
    reader.readAsDataURL(f);
  }
  e.target.value='';
}

function handleAIImgDrop(e){
  const files=Array.from(e.dataTransfer.files||[]).filter(f=>f.type.startsWith('image/'));
  for(const f of files){
    const reader=new FileReader();
    reader.onload=ev=>{
      aiUploadImgs.push(ev.target.result);
      updateAIPreview();
    };
    reader.readAsDataURL(f);
  }
}

function updateAIPreview(){
  const prev=document.getElementById('ai-img-preview');
  if(!prev)return;
  prev.innerHTML=aiUploadImgs.map((img,i)=>`
    <div class="upload-preview">
      <img src="${img}" alt="Upload ${i+1}">
      <button class="upload-preview-remove" onclick="removeAIImg(${i})">×</button>
    </div>`).join('');
  const btn=document.getElementById('ai-extract-btn');
  if(btn)btn.disabled=aiUploadImgs.length===0;
}

function removeAIImg(i){
  aiUploadImgs.splice(i,1);
  updateAIPreview();
}

async function runAIExtraction(){
  if(!aiUploadImgs.length)return;
  const btn=document.getElementById('ai-extract-btn');
  const statusWrap=document.getElementById('ai-status-wrap');
  btn.disabled=true;
  statusWrap.innerHTML='<div class="ai-status"><div class="ai-spinner"></div><span>Claude is reading your screenshots…</span></div>';
  
  try{
    // Build content blocks for Claude API
    const content=[];
    for(const imgData of aiUploadImgs){
      const match=imgData.match(/^data:(image\/[a-z]+);base64,(.+)$/);
      if(!match)continue;
      content.push({type:'image',source:{type:'base64',media_type:match[1],data:match[2]}});
    }
    const storeListStr=STORES.map(s=>`  - "${s}": ${(STORE_CATS[s]||[]).map(c=>`"${c}"`).join(', ')}`).join('\n');
    // Dynamic guidance: analyze existing items to infer which store each category maps to
    // This helps Claude assign ingredients to the right store based on the user's actual shopping patterns
    const catToStore={};
    for(const s of STORES){
      for(const c of (STORE_CATS[s]||[])){
        // First store that has this category becomes the canonical mapping
        if(!catToStore[c])catToStore[c]=s;
      }
    }
    // Also look at existing items + meal ingredients to learn patterns (e.g. which ingredients go where)
    const catExamples={};
    const addExample=(store,cat,name)=>{
      const k=store+' → '+cat;
      if(!catExamples[k])catExamples[k]=new Set();
      if(catExamples[k].size<5)catExamples[k].add(name);
    };
    for(const it of state.items)addExample(it.store,it.category,it.name);
    for(const m of state.meals)for(const ing of m.ingredients)addExample(ing.store,ing.category,ing.name);
    const exampleLines=Object.entries(catExamples).slice(0,20).map(([k,v])=>`  • ${k}: ${[...v].slice(0,4).join(', ')}`).join('\n');
    
    content.push({type:'text',text:`Extract recipe information from these screenshots. Return ONLY a valid JSON object with this exact structure (no markdown, no explanation, just raw JSON):

{
  "name": "Recipe name (be concise, 2-5 words)",
  "type": "main" or "side",
  "ingredients": [
    {"name": "Ingredient name", "qty": 1, "unit": "cup", "store": "${STORES[0]}", "category": "${(STORE_CATS[STORES[0]]||[])[0]||'General'}"}
  ],
  "recipe": "Step-by-step instructions as a single string with newlines between steps"
}

Rules:
- "type": "main" for entrees, "side" for salads/sides/veggies
- "qty": always a number (default 1)
- "unit": short abbreviation or empty string (e.g., "cup", "tbsp", "lb", "", "cloves")
- "store" must be exactly one of: ${STORES.map(s=>`"${s}"`).join(', ')}
- "category" must match the store. Valid store → category pairs:
${storeListStr}

Store assignment guidance — use the user's existing shopping patterns below to infer where each ingredient should go. Match the style of these real examples from their shopping history:
${exampleLines||'  (no existing items to learn from — assign to the most appropriate store + category based on category names)'}

If an ingredient could fit multiple stores, prefer the one where similar items already exist. For ingredient types not covered by examples, pick the best-fitting category based on the category name.

Do NOT include condiments/sauces/spices (mayo, ketchup, mustard, honey, coconut aminos, olive oil, salt, pepper, etc.) in the ingredients list unless they're the primary/featured ingredient of the dish — skip them since they're kept as household staples separately.

Return ONLY the JSON object, no other text.`});
    
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{role:'user',content}]
      })
    });
    if(!response.ok){
      const errTxt=await response.text();
      throw new Error('API error: '+response.status+' '+errTxt);
    }
    const data=await response.json();
    // Extract text from response
    let text='';
    if(Array.isArray(data.content)){
      text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    }
    // Clean up code fences if present
    text=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    // Parse JSON
    const parsed=JSON.parse(text);
    
    statusWrap.innerHTML='<div class="ai-status" style="background:#E3F2FD;color:#1565C0"><span style="font-size:18px">✨</span><span>Recipe extracted! Review and save below.</span></div>';
    setTimeout(()=>{
      // Normalize ingredients (validate store/category combos)
      const ings=(parsed.ingredients||[]).map(ing=>{
        let store=ing.store||STORES[0];
        if(!STORES.includes(store))store=STORES[0];
        let category=ing.category||STORE_CATS[store][0];
        if(!(STORE_CATS[store]||[]).includes(category))category=STORE_CATS[store][0];
        return {
          name:String(ing.name||'').trim(),
          qty:parseFloat(ing.qty)||1,
          unit:String(ing.unit||'').trim(),
          store,category
        };
      }).filter(i=>i.name);
      
      const meal={
        name:String(parsed.name||'New Meal').trim(),
        type:parsed.type==='side'?'side':'main',
        ingredients:ings,
        recipe:String(parsed.recipe||'').trim(),
        recipeImgs:[...aiUploadImgs]
      };
      closeModal();
      openModal('addMeal',meal);
      toast('Review the extracted recipe, then save');
    },600);
  }catch(e){
    console.error(e);
    statusWrap.innerHTML='<div class="ai-status" style="background:#FEE2E2;color:#991B1B"><span style="font-size:18px">⚠️</span><span>Extraction failed: '+esc(e.message)+'</span></div>';
    btn.disabled=false;
  }
}

    <button class="btn btn-secondary" style="width:100%;margin-bottom:16px;border:2px dashed #D1D5DB" onclick="addNewStore()">+ Add New Store</button>

      <button class="btn btn-primary" style="flex:1" onclick="closeModal()">Done</button>
    </div>`;
}

function renderStoreCard(storeName,idx){
  const cats=STORE_CATS[storeName]||[];
  const color=STORE_COLOR[storeName]||'#555';
  const itemCount=state.items.filter(it=>it.store===storeName).length;
  const mealIngCount=state.meals.reduce((s,m)=>s+m.ingredients.filter(ing=>ing.store===storeName).length,0);
  return `<div class="store-card" data-idx="${idx}" style="border-left-color:${color}">
    <div class="store-card-head">
      <input type="color" value="${color}" onchange="updateStoreColor('${esc(storeName)}',this.value)" title="Color" style="width:32px;height:32px;border:none;border-radius:6px;cursor:pointer;padding:0;background:transparent">
      <input class="input" value="${esc(storeName)}" onchange="renameStore('${esc(storeName)}',this.value)" style="flex:1;font-weight:700" placeholder="Store name">
      <button class="btn-icon" onclick="deleteStore('${esc(storeName)}')" title="Delete store" style="color:#DC2626">🗑</button>
    </div>
    <div class="store-card-meta">
      ${itemCount} staple${itemCount!==1?'s':''} · ${mealIngCount} meal ingredient${mealIngCount!==1?'s':''}
    </div>
    <div class="cat-tag-list" id="cats-${idx}">
      ${cats.map(c=>`
        <div class="cat-tag" style="background:${catColorOf(c)}20;color:${catColorOf(c)};border-color:${catColorOf(c)}40">
          <span>${esc(c)}</span>
          <button onclick="deleteCat('${esc(storeName)}','${esc(c)}')" title="Remove">×</button>
        </div>`).join('')}
      <button class="cat-add-btn" onclick="addCatToStore('${esc(storeName)}')">+ Add Category</button>
    </div>

}

function refreshStoresModal(){
  const list=document.getElementById('stores-mgmt-list');
  if(list)list.innerHTML=STORES.map((s,i)=>renderStoreCard(s,i)).join('');
}

function addNewStore(){
  const name=prompt('Name for the new store:');
  if(!name||!name.trim())return;
  const trimmed=name.trim();
  if(STORES.includes(trimmed)){alert('A store with that name already exists.');return;}
  STORES.push(trimmed);
  STORE_CATS[trimmed]=['General'];
  // Assign a new color from palette
  const usedColors=Object.values(STORE_COLOR);
  const available=STORE_COLOR_PALETTE.find(c=>!usedColors.includes(c));
  STORE_COLOR[trimmed]=available||STORE_COLOR_PALETTE[STORES.length%STORE_COLOR_PALETTE.length];
  persist();
  refreshStoresModal();
  renderShop();
  toast(`Store "${trimmed}" added`);
}

function renameStore(oldName,newNameRaw){
  const newName=(newNameRaw||'').trim();
  if(!newName||newName===oldName){refreshStoresModal();return;}
  if(STORES.includes(newName)){alert('A store with that name already exists.');refreshStoresModal();return;}
  // Update STORES array preserving order
  const idx=STORES.indexOf(oldName);
  if(idx<0)return;
  STORES[idx]=newName;
  STORE_CATS[newName]=STORE_CATS[oldName];delete STORE_CATS[oldName];
  STORE_COLOR[newName]=STORE_COLOR[oldName];delete STORE_COLOR[oldName];
  // Update all items
  for(const it of state.items)if(it.store===oldName)it.store=newName;
  // Update all meal ingredients
  for(const m of state.meals)for(const ing of m.ingredients)if(ing.store===oldName)ing.store=newName;
  // Update current store
  if(state.currentStore===oldName)state.currentStore=newName;
  persist();
  refreshStoresModal();
  renderShop();
  renderLibrary();
  toast(`Renamed to "${newName}"`);
}

function updateStoreColor(storeName,color){
  STORE_COLOR[storeName]=color;
  persist();
  refreshStoresModal();
  renderShop();
}

function deleteStore(storeName){
  if(STORES.length<=1){alert('You need at least one store.');return;}
  const itemCount=state.items.filter(it=>it.store===storeName).length;
  const mealIngCount=state.meals.reduce((s,m)=>s+m.ingredients.filter(ing=>ing.store===storeName).length,0);
  const affected=itemCount+mealIngCount;
  // Pick destination store
  const otherStores=STORES.filter(s=>s!==storeName);
  const destMsg=affected>0
    ? `Delete "${storeName}"?\n\n${itemCount} shopping item${itemCount!==1?'s':''} and ${mealIngCount} meal ingredient${mealIngCount!==1?'s':''} assigned to this store will be reassigned to "${otherStores[0]}".\n\nContinue?`
    : `Delete "${storeName}"?`;
  if(!confirm(destMsg))return;
  const dest=otherStores[0];
  const destCat=(STORE_CATS[dest]||[])[0]||'General';
  // Reassign items
  for(const it of state.items){
    if(it.store===storeName){
      it.store=dest;
      if(!(STORE_CATS[dest]||[]).includes(it.category))it.category=destCat;
    }
  }
  // Reassign meal ingredients
  for(const m of state.meals){
    for(const ing of m.ingredients){
      if(ing.store===storeName){
        ing.store=dest;
        if(!(STORE_CATS[dest]||[]).includes(ing.category))ing.category=destCat;
      }
    }
  }
  // Remove store
  STORES.splice(STORES.indexOf(storeName),1);
  delete STORE_CATS[storeName];
  delete STORE_COLOR[storeName];
  if(state.currentStore===storeName)state.currentStore=STORES[0];
  persist();
  refreshStoresModal();
  renderShop();
  renderLibrary();
  toast(`Store "${storeName}" deleted`);
}

function addCatToStore(storeName){
  const name=prompt(`Add new category to "${storeName}":`);
  if(!name||!name.trim())return;
  const trimmed=name.trim();
  if(!STORE_CATS[storeName])STORE_CATS[storeName]=[];
  if(STORE_CATS[storeName].includes(trimmed)){alert('Category already exists in this store.');return;}
  STORE_CATS[storeName].push(trimmed);
  persist();
  refreshStoresModal();
  renderShop();
  toast(`Category "${trimmed}" added`);
}

function deleteCat(storeName,catName){
  const cats=STORE_CATS[storeName]||[];
  if(cats.length<=1){alert('Each store needs at least one category.');return;}
  const itemCount=state.items.filter(it=>it.store===storeName&&it.category===catName).length;
  const mealIngCount=state.meals.reduce((s,m)=>s+m.ingredients.filter(ing=>ing.store===storeName&&ing.category===catName).length,0);
  const affected=itemCount+mealIngCount;
  const otherCats=cats.filter(c=>c!==catName);
  const destMsg=affected>0
    ? `Delete category "${catName}" from "${storeName}"?\n\n${affected} item${affected!==1?'s':''} will be moved to "${otherCats[0]}".\n\nContinue?`
    : `Delete category "${catName}" from "${storeName}"?`;
  if(!confirm(destMsg))return;
  const dest=otherCats[0];
  for(const it of state.items){
    if(it.store===storeName&&it.category===catName)it.category=dest;
  }
  for(const m of state.meals){
    for(const ing of m.ingredients){
      if(ing.store===storeName&&ing.category===catName)ing.category=dest;
    }
  }
  STORE_CATS[storeName]=otherCats;
  persist();
  refreshStoresModal();
  renderShop();
  renderLibrary();
  toast(`Category "${catName}" deleted`);
}

async function connectCloudSync(){
  const btn=document.getElementById('cloud-connect-btn');
  const apiKey=document.getElementById('cloud-api-key')?.value?.trim();
  const shareCode=document.getElementById('cloud-share-code')?.value?.trim();
  const statusEl=document.getElementById('cloud-setup-status');
  
  // If a share code was pasted, decode and connect to existing bin
  if(shareCode){
    btn.disabled=true;
    statusEl.innerHTML='<div class="ai-status"><div class="ai-spinner"></div><span>Joining family sync…</span></div>';
    try{
      const decoded=JSON.parse(atob(shareCode));
      if(!decoded.k||!decoded.b)throw new Error('Invalid share code format');
      setCloudConfig({apiKey:decoded.k,binId:decoded.b});
      // Pull the existing data
      const r=await cloudPull(true);
      if(!r.ok)throw new Error(r.err||'Failed to pull data');
      statusEl.innerHTML='<div class="ai-status" style="background:#DCFCE7;color:#166534"><span>✓</span><span>Connected! Pulling latest data…</span></div>';
      renderAll();
      startCloudAutoSync();
      setTimeout(()=>{closeCloudSync();toast('☁️ Cloud sync connected');},800);
    }catch(e){
      clearCloudConfig();
      statusEl.innerHTML='<div class="ai-status" style="background:#FEE2E2;color:#991B1B"><span>⚠️</span><span>Failed: '+esc(e.message)+'</span></div>';
      btn.disabled=false;
    }
    return;
  }
  
  // New setup: validate API key and create a new bin
  if(!apiKey){
    statusEl.innerHTML='<div class="ai-status" style="background:#FEE2E2;color:#991B1B"><span>⚠️</span><span>Paste your X-MASTER-KEY to connect.</span></div>';
    return;
  }
  if(!apiKey.startsWith('$2a$')&&!apiKey.startsWith('$2b$')){
    statusEl.innerHTML='<div class="ai-status" style="background:#FEF3C7;color:#92400E"><span>⚠️</span><span>That doesn\'t look like a JSONBin X-MASTER-KEY. It should start with <code>$2a$10$</code>. Double-check you copied the right value.</span></div>';
    return;
  }
  btn.disabled=true;
  statusEl.innerHTML='<div class="ai-status"><div class="ai-spinner"></div><span>Creating your cloud storage bin…</span></div>';
  try{
    const binId=await cloudCreateBin(apiKey);
    if(!binId)throw new Error('No bin ID returned');
    setCloudConfig({apiKey,binId});
    cloudLastPush=Date.now();
    statusEl.innerHTML='<div class="ai-status" style="background:#DCFCE7;color:#166534"><span>✓</span><span>Cloud sync connected! Your data is now saved online.</span></div>';
    startCloudAutoSync();
    // Re-render modal to show connected state
    setTimeout(()=>{
      document.getElementById('modal-box').innerHTML=renderCloudConnected(getCloudConfig());
      toast('☁️ Cloud sync active');
    },900);
  }catch(e){
    clearCloudConfig();
    statusEl.innerHTML='<div class="ai-status" style="background:#FEE2E2;color:#991B1B"><span>⚠️</span><span>Could not connect: '+esc(e.message)+'. Check your API key and try again.</span></div>';
    btn.disabled=false;
  }
}

function copyShareCode(){
  const field=document.getElementById('share-code-field');
  if(!field)return;
  field.select();
  try{
    document.execCommand('copy');
    toast('📋 Share code copied');
  }catch(e){
    if(navigator.clipboard){
      navigator.clipboard.writeText(field.value).then(()=>toast('📋 Share code copied'));
    }
  }
}

async function cloudManualPull(){
  toast('Pulling from cloud…');
  const r=await cloudPull(false);
  if(r.ok){
    toast('✓ Pulled latest data');
    closeCloudSync();

    toast('Pull failed: '+(r.err||'unknown'));

async function cloudManualPush(){

  const r=await cloudPush();
  if(r.ok){
    toast('✓ Pushed to cloud');
    // Refresh modal
    document.getElementById('modal-box').innerHTML=renderCloudConnected(getCloudConfig());
  }else{
    toast('Push failed: '+(r.err||'unknown'));

}

function disconnectCloudSync(){
  if(!confirm('Disconnect this device from cloud sync?\n\nYour local data stays intact. Your cloud data also stays intact — you can reconnect anytime using your share code.'))return;
  if(cloudAutoPullTimer){clearInterval(cloudAutoPullTimer);cloudAutoPullTimer=null;}
  clearCloudConfig();
  updateSyncStatus(null);
  closeCloudSync();
  toast('Cloud sync disconnected');
}

function closeCloudSync(){
  const box=document.getElementById('modal-box');
  if(box)box.style.maxWidth='';
  closeModal();
}

function setCatalogStore(s){
  state.catalogStore=s;
  renderCatalogModal();
}

function renderCatalogItems(returnOnly){
  const q=(state.catalogSearch||'').toLowerCase().trim();
  // Group catalog items by category within current store
  const storeItems=state.items.filter(it=>it.store===state.catalogStore);
  const filtered=q?storeItems.filter(it=>it.name.toLowerCase().includes(q)):storeItems;
  // Group by category
  const grouped={};
  for(const c of (STORE_CATS[state.catalogStore]||[])){grouped[c]=[];}
  for(const it of filtered){
    if(!grouped[it.category])grouped[it.category]=[];
    grouped[it.category].push(it);
  }
  let html='';
  for(const cat of Object.keys(grouped)){
    const items=grouped[cat];
    if(!items.length)continue;
    const cc=CAT_COLOR[cat]||'#666';
    // Sort alphabetically within category
    items.sort((a,b)=>a.name.localeCompare(b.name));
    html+=`<div class="cat-section-group">
      <div class="cat-section-head" style="color:${cc}">
        <span class="cat-section-bar" style="background:${cc}"></span>${esc(cat)} <span style="color:var(--text-muted);font-weight:500">· ${items.length}</span>
      </div>`;
    for(const it of items){
      const onList=!!state.onList[it.id];
      const stats=getPurchaseStats(purchaseKey(it));
      const timesLabel=stats?` · bought ${stats.count}×`:'';
      html+=`<label class="cat-item-row${onList?' on-list':''}">
        <input type="checkbox" ${onList?'checked':''} onchange="toggleCatalog('${it.id}',this.checked)" style="width:18px;height:18px;accent-color:${cc};cursor:pointer;flex-shrink:0">
        <div style="flex:1;min-width:0">
          <div class="cat-item-name">${esc(it.name)}</div>
          <div class="cat-item-meta">${fmtQty(it.qty)} ${esc(it.unit||'')}${timesLabel}</div>
        </div>
        <button class="btn-icon" onclick="editCatalogItem('${it.id}',event)" title="Edit" style="font-size:14px">✏️</button>
        <button class="btn-icon" onclick="deleteCatalogItem('${it.id}',event)" title="Delete permanently" style="color:#DC2626;font-size:14px">🗑</button>
      </label>`;
    }
    html+='</div>';
  }
  if(!html){
    html=`<div class="empty" style="padding:30px 20px"><div class="msg">No items ${q?'match':'in this store'}</div>${q?'<div class="sub">Try a different search</div>':'<div class="sub">Click "Add Item" to build your catalog</div>'}</div>`;
  }
  if(returnOnly)return html;
  const el=document.getElementById('cat-items');
  if(el)el.innerHTML=html;
}

function toggleCatalog(id,on){
  state.onList[id]=on;
  persist();
  // Refresh the catalog tabs so the "N/M on list" count updates
  renderCatalogModal();
  renderShop();
}

function catalogToggleAll(onState){
  const storeItems=state.items.filter(it=>it.store===state.catalogStore);
  // Optional: only apply to items matching current search
  const q=(state.catalogSearch||'').toLowerCase().trim();
  const target=q?storeItems.filter(it=>it.name.toLowerCase().includes(q)):storeItems;
  for(const it of target)state.onList[it.id]=onState;
  persist();
  renderCatalogModal();
  renderShop();
  toast(onState?`${target.length} item${target.length!==1?'s':''} added`:`${target.length} item${target.length!==1?'s':''} removed from list`);
}

function editCatalogItem(id,ev){
  ev.preventDefault();ev.stopPropagation();
  const item=state.items.find(i=>i.id===id);
  if(!item)return;
  closeCatalog();
  openModal('editItem',item);
}

function deleteCatalogItem(id,ev){
  ev.preventDefault();ev.stopPropagation();
  const item=state.items.find(i=>i.id===id);
  if(!item)return;
  if(!confirm(`Permanently delete "${item.name}" from the catalog?\n\nThis also removes purchase history for this item.`))return;
  state.items=state.items.filter(i=>i.id!==id);
  delete state.onList[id];
  // Clean up purchase history for this item's key
  const key=purchaseKey(item);
  if(state.purchases[key])delete state.purchases[key];
  if(state.dismissed[key])delete state.dismissed[key];
  persist();
  renderCatalogModal();
  renderShop();
  toast(`${item.name} deleted from catalog`);
}

function closeCatalog(){
  // Reset modal-box max-width
  const box=document.getElementById('modal-box');
  if(box)box.style.maxWidth='';
  closeModal();
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function fmtQty(n){
  if(!n)return'';
  return n%1===0?n.toString():n.toFixed(1);
}
function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
init();
</script>
